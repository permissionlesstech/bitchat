name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    continue-on-error: true # Annotations appear on PR but never block merging
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel
