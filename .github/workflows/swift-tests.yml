name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    continue-on-error: true # Annotations appear on PR but never block merging
    container:
      image: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Run Swift Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/Package.resolved') }}
            ${{ runner.os }}-build-

      - name: Run Tests
        run: swift test --parallel

  xcode-build-macos:
    name: Xcode Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build
        run: |
          xcodebuild \
            -project bitchat.xcodeproj \
            -scheme "bitchat (macOS)" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            build

  xcode-build-ios:
    name: Xcode Build (iOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build
        run: |
          xcodebuild \
            -project bitchat.xcodeproj \
            -scheme "bitchat (iOS)" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            build
